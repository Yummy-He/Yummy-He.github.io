<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>头图焦点选取器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 { font-size: 1.4rem; margin: 10px 0 20px; color: #fff; font-weight: 600; }
  .drop-zone {
    width: 100%; max-width: 800px;
    min-height: 160px;
    border: 2px dashed #555;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    margin-bottom: 20px;
    color: #999;
    font-size: 1rem;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #4fc3f7; background: rgba(79,195,247,.06); }
  .workspace { display: none; width: 100%; max-width: 1000px; }
  .img-container {
    position: relative; display: inline-block; cursor: crosshair;
    max-width: 100%; line-height: 0;
  }
  .img-container img { max-width: 100%; max-height: 70vh; display: block; border-radius: 4px; }
  .crosshair {
    display: none; position: absolute;
    pointer-events: none; transform: translate(-50%, -50%);
  }
  .crosshair::before, .crosshair::after {
    content: ''; position: absolute;
    background: rgba(255,50,50,.85);
  }
  .crosshair::before { width: 1px; height: 21px; left: 0; top: -10px; }
  .crosshair::after  { width: 21px; height: 1px; left: -10px; top: 0; }
  .crosshair-dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 2px solid rgba(255,50,50,.85); background: transparent;
  }
  .info-panel {
    margin-top: 16px; display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-start;
  }
  .info-card {
    background: #16213e; border-radius: 8px; padding: 14px 18px;
    min-width: 200px;
  }
  .info-card label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: .5px; }
  .info-card .value { font-size: 1.6rem; font-weight: 700; color: #4fc3f7; margin: 2px 0; }
  .info-card .hint { font-size: 0.7rem; color: #666; }
  .yaml-box {
    background: #0d1117; border-radius: 8px; padding: 14px 18px;
    font-family: "Fira Code", Menlo, Monaco, monospace; font-size: 0.85rem;
    color: #c9d1d9; white-space: pre; line-height: 1.6;
    flex: 1; min-width: 260px;
  }
  .yaml-box .key { color: #79c0ff; }
  .yaml-box .val { color: #a5d6ff; }
  .copy-btn {
    display: inline-block; margin-top: 8px; padding: 5px 14px;
    background: #238636; color: #fff; border: none; border-radius: 6px;
    font-size: 0.8rem; cursor: pointer; transition: background .15s;
  }
  .copy-btn:hover { background: #2ea043; }
  .copy-btn.copied { background: #555; }
  .reset-btn {
    background: transparent; border: 1px solid #555; color: #aaa;
    padding: 5px 14px; border-radius: 6px; cursor: pointer;
    font-size: 0.8rem; margin-left: 6px;
  }
  .reset-btn:hover { border-color: #999; color: #fff; }
</style>
</head>
<body>

<h1>头图焦点选取器</h1>

<div class="drop-zone" id="dropZone">
  拖拽图片到此处，或点击选择文件
  <input type="file" accept="image/*" id="fileInput" style="display:none">
</div>

<div class="workspace" id="workspace">
  <div class="img-container" id="imgContainer">
    <img id="preview" alt="预览">
    <div class="crosshair" id="crosshair"><div class="crosshair-dot"></div></div>
  </div>

  <div class="info-panel">
    <div class="info-card">
      <label>水平焦点 X</label>
      <div class="value" id="valX">—</div>
      <div class="hint">header-focus-x</div>
    </div>
    <div class="info-card">
      <label>垂直焦点 Y</label>
      <div class="value" id="valY">—</div>
      <div class="hint">header-focus-y</div>
    </div>
    <div class="yaml-box" id="yamlBox">
<span class="key">header-focus-x</span>: <span class="val" id="yamlX">—</span>
<span class="key">header-focus-y</span>: <span class="val" id="yamlY">—</span>
    </div>
    <div>
      <button class="copy-btn" id="copyBtn" onclick="copyYAML()">复制 YAML</button>
      <button class="reset-btn" onclick="resetPoint()">清除焦点</button>
    </div>
  </div>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const workspace = document.getElementById('workspace');
const preview = document.getElementById('preview');
const imgContainer = document.getElementById('imgContainer');
const crosshair = document.getElementById('crosshair');
const valX = document.getElementById('valX');
const valY = document.getElementById('valY');
const yamlX = document.getElementById('yamlX');
const yamlY = document.getElementById('yamlY');
const copyBtn = document.getElementById('copyBtn');

let focusX = null, focusY = null;

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});

function loadImage(file) {
  const url = URL.createObjectURL(file);
  preview.src = url;
  preview.onload = () => {
    workspace.style.display = 'block';
    dropZone.style.display = 'none';
    resetPoint();
  };
}

preview.addEventListener('click', e => {
  const rect = preview.getBoundingClientRect();
  focusX = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
  focusY = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
  updateDisplay();
});

function updateDisplay() {
  if (focusX === null) return;
  valX.textContent = focusX + '%';
  valY.textContent = focusY + '%';
  yamlX.textContent = focusX;
  yamlY.textContent = focusY;
  crosshair.style.display = 'block';
  crosshair.style.left = focusX + '%';
  crosshair.style.top = focusY + '%';
}

function resetPoint() {
  focusX = null; focusY = null;
  valX.textContent = '—'; valY.textContent = '—';
  yamlX.textContent = '—'; yamlY.textContent = '—';
  crosshair.style.display = 'none';
}

function copyYAML() {
  if (focusX === null) return;
  const text = `header-focus-x: ${focusX}\nheader-focus-y: ${focusY}`;
  navigator.clipboard.writeText(text).then(() => {
    copyBtn.textContent = '已复制!';
    copyBtn.classList.add('copied');
    setTimeout(() => { copyBtn.textContent = '复制 YAML'; copyBtn.classList.remove('copied'); }, 1500);
  });
}
</script>
</body>
</html>
